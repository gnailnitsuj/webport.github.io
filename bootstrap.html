<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<title> Bootstrap </title>
<body style="background-color: darkgoldenrod; font-family: 'Courier New', Courier, monospace;">
    <a href="index.html"> Back to Portfolio </a>
    <h1> Bootstrap HW </h1> <br>
    <div class="container text-center" style="border: 1px solid aliceblue">
  <!-- Stack the columns on mobile by making one full-width and the other half-width -->
  <div class="row">
    <div class="col-md-8" style="border: 1px solid aliceblue">.col-md-8</div>
    <div class="col-6 col-md-4" style="border: 1px solid aliceblue">.col-6 .col-md-4</div>
  </div>

  <!-- Columns start at 50% wide on mobile and bump up to 33.3% wide on desktop -->
  <div class="row">
    <div class="col-6 col-md-4" style="border: 1px solid aliceblue">.col-6 .col-md-4</div>
    <div class="col-6 col-md-4" style="border: 1px solid aliceblue">.col-6 .col-md-4</div>
    <div class="col-6 col-md-4" style="border: 1px solid aliceblue">.col-6 .col-md-4</div>
  </div>

  <!-- Columns are always 50% wide, on mobile and desktop -->
  <div class="row">
    <div class="col-6" style="border: 1px solid aliceblue">.col-6</div>
    <div class="col-6" style="border: 1px solid aliceblue">.col-6</div>
  </div>
</div>
</body>

</html>
